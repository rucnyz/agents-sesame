# Television cable channel config for ase
# Copy to ~/.config/television/cable/ase.toml
# Then: tv ase

[metadata]
name = "ase"
description = "Search and resume coding agent sessions"
requirements = ["ase"]

[source]
command = "ase --list --format=tsv"
display = "{split:\t:1}  {split:\t:2}  {split:\t:3}  {split:\t:5}"
output = "{split:\t:0}"

[preview]
command = "ase --preview '{split:\t:0}'"

[keybindings]
enter = "actions:resume"

[actions.resume]
description = "Resume the selected session"
command = "ase --resume '{split:\t:0}'"
mode = "execute"
