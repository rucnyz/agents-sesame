name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  agent-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install coding agents
        run: |
          npm install -g @openai/codex || true
          npm install -g @google/gemini-cli || true
          npm install -g @qwen-code/qwen-code@latest || true
          npm install -g opencode-ai@latest || true
          pip install kimi-cli || true

      - name: Verify agent binaries
        run: |
          echo "=== Installed agent versions ==="
          which codex && codex --version || echo "codex: not found"
          which gemini && gemini --version || echo "gemini: not found"
          which qwen-code && qwen-code --version || echo "qwen-code: not found"
          which opencode && opencode --version || echo "opencode: not found"
          which kimi && kimi --version || echo "kimi: not found"
